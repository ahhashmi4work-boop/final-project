<!DOCTYPE html>
<html>
<head>
    <title>Hugging Face Summarizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>📝 Hugging Face Text Summarizer</h1>

    <form method="POST">
        <textarea name="text" placeholder="Paste your text here..." required></textarea>
        <button type="submit">Summarize</button>
    </form>

    {% if summary %}
    <div class="result">
        <h2>Summary:</h2>
        <p>{{ summary }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
